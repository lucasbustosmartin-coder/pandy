<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" preserveAspectRatio="xMidYMid meet">
  <!-- Contorno circular negro -->
  <circle cx="16" cy="16" r="15" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Fondo blanco dentro del circulo -->
  <circle cx="16" cy="16" r="14" fill="#fff"/>
  <!-- Orejas negras redondas (arriba) -->
  <circle cx="9" cy="8" r="4" fill="#000"/>
  <circle cx="23" cy="8" r="4" fill="#000"/>
  <!-- Parches negros alrededor de los ojos (forma de panda) -->
  <ellipse cx="9.5" cy="14.5" rx="3.2" ry="2.5" fill="#000"/>
  <ellipse cx="22.5" cy="14.5" rx="3.2" ry="2.5" fill="#000"/>
  <!-- Puntos blancos en los ojos -->
  <circle cx="9" cy="14" r="0.8" fill="#fff"/>
  <circle cx="22" cy="14" r="0.8" fill="#fff"/>
  <!-- Nariz negra -->
  <ellipse cx="16" cy="19" rx="1.5" ry="1.2" fill="#000"/>
  <!-- Boca: linea curva -->
  <path d="M14 21.2 Q16 22.5 18 21.2" fill="none" stroke="#000" stroke-width="0.9" stroke-linecap="round"/>
</svg>
